name: Mac Mini Price Monitor

on:
  schedule:
    # Twice daily: 7:00 and 17:00 UTC (9:00 and 19:00 Finnish time)
    - cron: '0 7 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - uses: astral-sh/setup-uv@v7

    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Run monitor
      env:
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
      run: uv run monitor.py

    - name: Commit updated listings
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git pull origin main --rebase || git pull origin main
        if [ -f "listings.json" ]; then
          git add listings.json
          if ! git diff --staged --quiet; then
            git commit -m "Update listings - $(date +'%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3; do
              git push origin main && break
              git pull origin main --rebase || git pull origin main
              sleep 2
            done
          fi
        fi
